# QA Environment Configuration for PetStore Automation Framework

# Environment Settings
environment=qa
base_url=https://petstore-qa.swagger.io/v2

# Request Configuration
request_timeout=30
connection_timeout=10

# Logging Configuration
log_level=DEBUG

# Report Configuration
enable_extent_reports=true
report_directory=./reports
screenshot_directory=./screenshots

# Data Configuration
test_data_directory=./testdata
enable_data_driven_testing=true

# API Request Configuration
request_log_enabled=true
response_log_enabled=true
pretty_print_json=true

# Retry Configuration
enable_retry=true
retry_count=3
